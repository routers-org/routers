apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: routers-dev
  labels:
    app: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: orchestrator
          image: routers-orchestrator:latest
          imagePullPolicy: Never
          ports:
            - name: metrics
              containerPort: 9091
          env:
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq.routers-dev.svc.cluster.local:5672/%2f"
            - name: NATS_URL
              value: "nats://nats.routers-dev.svc.cluster.local:4222"
            - name: VALKEY_URL
              value: "redis://valkey-primary.routers-dev.svc.cluster.local:6379"
            - name: METRICS_ADDR
              value: "0.0.0.0:9091"
            - name: VALKEY_BATCH
              value: "64"
            - name: VALKEY_BATCH_TIMEOUT_MS
              value: "2"
            - name: PARALLELISM
              value: "1"
          resources:
            requests:
              cpu: 500m
              memory: 128Mi
            limits:
              cpu: 2000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-metrics
  namespace: routers-dev
  labels:
    app: orchestrator
spec:
  selector:
    app: orchestrator
  ports:
    - name: metrics
      port: 9091
      targetPort: 9091
