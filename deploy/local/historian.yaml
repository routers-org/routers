apiVersion: apps/v1
kind: Deployment
metadata:
  name: historian
  namespace: routers-dev
  labels:
    app: historian
spec:
  replicas: 3
  selector:
    matchLabels:
      app: historian
  template:
    metadata:
      labels:
        app: historian
    spec:
      containers:
        - name: historian
          image: routers-historian:latest
          imagePullPolicy: Never
          env:
            - name: NATS_URL
              value: "nats://nats.routers-dev.svc.cluster.local:4222"
            - name: EVENTS_CONSUMER
              value: "historian"
            - name: VALKEY_URL
              value: "redis://valkey-primary.routers-dev.svc.cluster.local:6379"
            - name: SHARD_PRECISION
              value: "5"
            - name: VALKEY_BATCH
              value: "64"
            - name: VALKEY_BATCH_TIMEOUT_MS
              value: "2"
            - name: RUST_LOG
              value: "debug"
          resources:
            requests:
              cpu: 500m
              memory: 64Mi
            limits:
              memory: 256Mi
