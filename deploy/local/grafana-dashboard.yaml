apiVersion: v1
kind: ConfigMap
metadata:
  name: routers-realtime-dashboard
  namespace: routers-dev
  labels:
    grafana_dashboard: "1"
data:
  routers-realtime.json: |
    {
      "title": "Routers Realtime",
      "uid": "routers-realtime",
      "version": 4,
      "refresh": "2s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "timezone": "browser",
      "tags": [
        "routers"
      ],
      "panels": [
        {
          "id": 1,
          "title": "Event Throughput (events/s)",
          "type": "timeseries",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 12,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "lineWidth": 2
              }
            }
          },
          "targets": [
            {
              "expr": "rate(routers_events_received_total[15s])",
              "legendFormat": "received",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "rate(routers_events_published_total[15s])",
              "legendFormat": "published to NATS",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 2,
          "title": "Processing Latency (ms)",
          "type": "timeseries",
          "gridPos": {
            "x": 12,
            "y": 0,
            "w": 12,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "lineWidth": 2
              }
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(routers_total_latency_ms_bucket[15s]))",
              "legendFormat": "p50",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "histogram_quantile(0.95, rate(routers_total_latency_ms_bucket[15s]))",
              "legendFormat": "p95",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "histogram_quantile(0.99, rate(routers_total_latency_ms_bucket[15s]))",
              "legendFormat": "p99",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 3,
          "title": "Events Received (total)",
          "type": "stat",
          "gridPos": {
            "x": 0,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "expr": "routers_events_received_total",
              "legendFormat": "",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 4,
          "title": "Events Published (total)",
          "type": "stat",
          "gridPos": {
            "x": 6,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "expr": "routers_events_published_total",
              "legendFormat": "",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 5,
          "title": "Dropped Events (received \u2212 published)",
          "type": "stat",
          "gridPos": {
            "x": 12,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "value": null,
                    "color": "green"
                  },
                  {
                    "value": 1,
                    "color": "red"
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "expr": "routers_events_received_total - routers_events_published_total",
              "legendFormat": "",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 6,
          "title": "Store Errors (total)",
          "type": "stat",
          "gridPos": {
            "x": 18,
            "y": 8,
            "w": 6,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "value": null,
                    "color": "green"
                  },
                  {
                    "value": 1,
                    "color": "red"
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          },
          "targets": [
            {
              "expr": "routers_store_errors_total",
              "legendFormat": "",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 7,
          "title": "Per-Event Latency Breakdown (avg ms)",
          "description": "Where time goes per event. 'other' = total \u2212 store \u2212 nats (deserialization, routing, history filtering).",
          "type": "timeseries",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 24,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": {
                "lineWidth": 2
              }
            }
          },
          "options": {
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "rate(routers_total_latency_ms_sum[15s]) / rate(routers_total_latency_ms_count[15s])",
              "legendFormat": "total",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "rate(routers_store_latency_ms_sum[15s]) / rate(routers_store_latency_ms_count[15s])",
              "legendFormat": "valkey (store)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "rate(routers_nats_latency_ms_sum[15s]) / rate(routers_nats_latency_ms_count[15s])",
              "legendFormat": "nats (publish)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "rate(routers_total_latency_ms_sum[15s]) / rate(routers_total_latency_ms_count[15s]) - rate(routers_store_latency_ms_sum[15s]) / rate(routers_store_latency_ms_count[15s])",
              "legendFormat": "other (deser + routing + history)",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 8,
          "title": "Event Age When Received (ms)",
          "type": "timeseries",
          "description": "How old events are by the time the orchestrator receives them.",
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 24,
            "h": 7
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, rate(routers_event_age_ms_bucket[15s]))",
              "legendFormat": "p50",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "histogram_quantile(0.95, rate(routers_event_age_ms_bucket[15s]))",
              "legendFormat": "p95",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 9,
          "title": "Match Outcomes (total)",
          "type": "stat",
          "gridPos": {
            "x": 0,
            "y": 27,
            "w": 8,
            "h": 5
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(routers_matches_total_success)",
              "legendFormat": "success",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "sum(routers_matches_total_no_candidate)",
              "legendFormat": "no_candidate",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "sum(routers_matches_total_error)",
              "legendFormat": "error",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 10,
          "title": "Match Success Rate",
          "type": "stat",
          "gridPos": {
            "x": 8,
            "y": 27,
            "w": 8,
            "h": 5
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "colorMode": "background"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 0.8
                  },
                  {
                    "color": "green",
                    "value": 0.95
                  }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(routers_matches_total_success) / (sum(routers_matches_total_success) + sum(routers_matches_total_no_candidate) + sum(routers_matches_total_error))",
              "legendFormat": "success rate",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 11,
          "title": "HMM Solve Time (ms)",
          "type": "timeseries",
          "gridPos": {
            "x": 16,
            "y": 27,
            "w": 8,
            "h": 5
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            }
          },
          "targets": [
            {
              "expr": "rate(routers_solve_latency_ms_sum[30s]) / rate(routers_solve_latency_ms_count[30s])",
              "legendFormat": "avg solve ms",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        },
        {
          "id": 12,
          "title": "Match End-to-End Latency (ms)",
          "type": "timeseries",
          "gridPos": {
            "x": 0,
            "y": 32,
            "w": 24,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms"
            }
          },
          "options": {
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "expr": "rate(routers_match_latency_ms_sum[30s]) / rate(routers_match_latency_ms_count[30s])",
              "legendFormat": "avg end-to-end ms",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "histogram_quantile(0.50, rate(routers_match_latency_ms_bucket[30s]))",
              "legendFormat": "p50",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "histogram_quantile(0.95, rate(routers_match_latency_ms_bucket[30s]))",
              "legendFormat": "p95",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "expr": "histogram_quantile(0.99, rate(routers_match_latency_ms_bucket[30s]))",
              "legendFormat": "p99",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          }
        }
        ,
        {
          "id": 100,
          "title": "Pipeline Lag",
          "type": "row",
          "gridPos": { "x": 0, "y": 40, "w": 24, "h": 1 },
          "collapsed": false
        },
        {
          "id": 13,
          "title": "Pipeline Stage Rates (events/s)",
          "description": "Throughput at each stage. Gaps between lines reveal where the pipeline falls behind — the wider the gap, the deeper the queue at that stage.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 41, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "rate(routers_events_received_total[15s])",
              "legendFormat": "① RabbitMQ → Orchestrator (consumed)",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "rate(routers_events_published_total[15s])",
              "legendFormat": "② Orchestrator → NATS (published)",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "sum(rate(routers_matches_total_success[15s])) + sum(rate(routers_matches_total_no_candidate[15s])) + sum(rate(routers_matches_total_error[15s]))",
              "legendFormat": "③ Matcher output (matched/s)",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 14,
          "title": "Stage Backlogs (accumulated events)",
          "description": "Orchestrator in-flight = received − published (events being processed right now). NATS backlog = published − matched (events sitting in JetStream waiting for a matcher).",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 49, "w": 24, "h": 7 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "custom": { "lineWidth": 2, "fillOpacity": 12 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "routers_events_received_total - routers_events_published_total",
              "legendFormat": "Orchestrator in-flight (received − published)",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "routers_events_published_total - (sum(routers_matches_total_success) + sum(routers_matches_total_no_candidate) + sum(routers_matches_total_error))",
              "legendFormat": "NATS backlog (published − matched)",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        },
        {
          "id": 15,
          "title": "Stage Latency Breakdown (avg ms)",
          "description": "Time spent at each stage per event. 'Matcher queue wait' is the gap between NATS delivery and when the matcher starts solving — directly shows matcher saturation.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 56, "w": 24, "h": 8 },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "lineWidth": 2 }
            }
          },
          "options": { "tooltip": { "mode": "multi" } },
          "targets": [
            {
              "expr": "rate(routers_total_latency_ms_sum[15s]) / rate(routers_total_latency_ms_count[15s])",
              "legendFormat": "Orchestrator total (AMQP recv → NATS ack)",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "rate(routers_store_latency_ms_sum[15s]) / rate(routers_store_latency_ms_count[15s])",
              "legendFormat": "  └ Valkey store",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "rate(routers_nats_latency_ms_sum[15s]) / rate(routers_nats_latency_ms_count[15s])",
              "legendFormat": "  └ NATS publish + ack",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "rate(routers_match_latency_ms_sum[30s]) / rate(routers_match_latency_ms_count[30s]) - rate(routers_solve_latency_ms_sum[30s]) / rate(routers_solve_latency_ms_count[30s])",
              "legendFormat": "Matcher queue wait (sitting in NATS before pickup)",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "rate(routers_solve_latency_ms_sum[30s]) / rate(routers_solve_latency_ms_count[30s])",
              "legendFormat": "  └ HMM solve",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            },
            {
              "expr": "rate(routers_match_latency_ms_sum[30s]) / rate(routers_match_latency_ms_count[30s])",
              "legendFormat": "Matcher total (NATS delivery → result published)",
              "datasource": { "type": "prometheus", "uid": "prometheus" }
            }
          ],
          "datasource": { "type": "prometheus", "uid": "prometheus" }
        }
      ],
      "schemaVersion": 36
    }
