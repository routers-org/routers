name: Automated Release

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches:
      - main

env:
  PROTOC_VERSION: 3.20.3
  CARGO_TERM_COLOR: always
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  # Release unpublished packages.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      # Expose these variables so the matrix job can read them
      did_release: ${{ steps.release.outputs.releases != '[]' && steps.release.outputs.releases != '' }}
      tag: ${{ steps.parse_tag.outputs.ROUTERS_TAG }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Packager
        run: |
          cargo install --locked protoc-gen-buffa-packaging

      - name: Generate Schema
        run: |
          buf generate

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Parse new tag
        id: parse_tag
        if: steps.release.outputs.releases != '[]' && steps.release.outputs.releases != ''
        run: |
          # https://release-plz.dev/docs/usage/release#json-output
          TAG=$(echo '${{ steps.release.outputs.releases }}' | jq -r '.[] | select(.package_name == "routers") | .tag')
          echo "ROUTERS_TAG=$TAG" >> "$GITHUB_OUTPUT"
          echo "Successfully released and tagged: $TAG"

  build-containers:
    name: Build and push containers
    runs-on: ubuntu-latest
    needs: release-plz-release
    if: needs.release-plz-release.outputs.did_release == 'true'
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - name: orchestrator
            file: infrastructure/orchestrator/Dockerfile
          - name: matcher
            file: infrastructure/matcher/Dockerfile
          - name: historian
            file: infrastructure/historian/Dockerfile
      fail-fast: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Install Packager
        run: cargo install --locked protoc-gen-buffa-packaging

      - name: Generate Schema
        run: buf generate

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/routers-${{ matrix.name }}:latest
            ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/routers-${{ matrix.name }}:${{ needs.release-plz-release.outputs.tag }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
