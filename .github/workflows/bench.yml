name: Benchmark

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

env:
  PROTOC_VERSION: 3.20.3
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: codspeed-macro

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}

      - name: Install Buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Toolchain, Cache and Codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache: false
          bins: cargo-codspeed

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install Packager
        run: |
          cargo install --locked protoc-gen-buffa-packaging

      - name: Generate Schema
        run: |
          buf generate

      - name: 🔨Build (workspace)
        run: cargo codspeed build --workspace --jobs 4

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v3
        with:
          run: INSTA_UPDATE=always cargo codspeed run --workspace
          token: ${{ secrets.CODSPEED_TOKEN }}

      - name: Check for snapshot drift
        run: |
          if ! git diff --quiet benches/snapshots/; then
            echo "Benchmark snapshots changed. Run 'just bench' locally and commit the updated files."
            echo "Changed files:"
            git diff --stat benches/snapshots/
            exit 1
          fi
        env:
          GIT_LFS_SKIP_SMUDGE: 0
