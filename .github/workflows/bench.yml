name: Benchmark

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

env:
  PROTOC_VERSION: 3.20.3
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: codspeed-macro

    strategy:
      matrix:
        include:
          # Workspace default — covers every crate, including routers_tz with its default
          # (s2cell) feature. Add entries below for non-default feature configurations
          # that should also be benchmarked.
          - name: workspace
            args: "--workspace"
          - name: routers_tz-rtree
            args: "-p routers_tz --no-default-features --features rtree"
          - name: routers_tz-basic
            args: "-p routers_tz --no-default-features --features basic"

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: install protoc
        uses: taiki-e/install-action@v2
        with:
          tool: protoc@${{ env.PROTOC_VERSION }}

      - name: Install Just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Initialise
        run: just init

      - name: Toolchain, Cache and Codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache: false
          bins: cargo-codspeed

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: 🔨Build (${{ matrix.name }})
        run: cargo codspeed build ${{ matrix.args }}

      - name: Run the benchmarks (${{ matrix.name }})
        uses: CodSpeedHQ/action@v3
        with:
          run: cargo codspeed run ${{ matrix.args }}
          token: ${{ secrets.CODSPEED_TOKEN }}
