[package]
name = "routers_realtime"
version = "0.1.1"
edition = "2024"
description = "Real-Time Map Matching Pipeline"
license = "GPL-3.0-or-later"

[lib]
name = "routers_realtime"
path = "src/lib.rs"

[dependencies]
# Workspace
routers = { workspace = true }
routers_codec = { workspace = true }
routers_network = { workspace = true }
routers_shard = { workspace = true }
geo = { workspace = true, features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
postcard = { workspace = true }
bytes = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }

futures = "0.3.32"

# NATS
async-nats = "0.38.0"

# Valkey / Redis
redis = { version = "0.29", features = ["tokio-comp", "streams"] }

# Metrics
prometheus = { workspace = true }
axum = { workspace = true }

# Serialization / time
chrono = "0.4.44"
serde_json = "1.0.149"
log = { workspace = true }
env_logger = "0.11"

# Per-vehicle state cache for streaming-match (Phase 1 of partial-state matching).
dashmap = "6"

[dev-dependencies]
routers_fixtures = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
csv = "1"
polars = { version = "0.46", default-features = false, features = ["lazy", "csv"] }

[lints]
workspace = true

[[bin]]
name = "orchestrator"
path = "bin/orchestrator.rs"

[[bin]]
name = "matcher"
path = "bin/matcher.rs"

[[bin]]
name = "historian"
path = "bin/historian.rs"

[[example]]
name = "process"
path = "examples/process.rs"

[[example]]
name = "replay_large"
path = "examples/replay_large.rs"

[[example]]
name = "build_shards"
path = "examples/build_shards.rs"
