[package]
name = "routers_viewer"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "routers_viewer"
path = "src/lib.rs"
bench = false

[dependencies]
routers = { workspace = true }
routers_network = { workspace = true }
routers_codec = { workspace = true }

geo = { workspace = true }
wkt = { workspace = true }

# UI Dependencies â€” `wgpu` backend instead of the default `glow` so the
# same code path runs natively (Metal/Vulkan/DX12) and, later, in the
# browser (WebGPU). `default_fonts` is preserved so we keep the egui font
# atlas without having to ship one ourselves.
eframe = { version = "0.33.0", default-features = false, features = [
    "wgpu",
    "default_fonts",
] }
egui = "0.33.0"
walkers = "0.47" # Version compatible with egui 0.33

# Mock Network Dependencies
petgraph = { workspace = true }
rstar = { workspace = true }
rustc-hash = { workspace = true }
pathfinding = "4.14.0"

# `tokio` is only used by the native `viewer` example for its `#[tokio::main]`
# entry. The library itself doesn't touch it, and on `wasm32-unknown-unknown`
# tokio rejects `rt-multi-thread` / `fs` (which the workspace dep enables).
# Gate it to native targets and use `wasm-bindgen-futures::spawn_local` for
# async work on the web.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { workspace = true }
env_logger = "0.11"

# eframe 0.33 declares `wgpu` on wasm32 with `default-features = false` and
# `features = ["std"]`, which leaves wgpu's own `web` cfg gate disabled â€”
# `egui-wgpu` then fails to compile because it can't see `wgpu::web_sys`.
# Pull `wgpu` in directly on the web target with the `web` + `webgpu`
# features enabled so the `cfg(web)` block in wgpu's `build.rs` activates.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wgpu = { version = "27.0.1", default-features = false, features = [
    "std",
    "web",
    "webgpu",
] }

# Web-only entry-point machinery â€” see `examples/web_viewer.rs`. None of
# these are usable on native targets.
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = [
    "Document",
    "Element",
    "HtmlCanvasElement",
    "Window",
] }

[dev-dependencies]
routers_fixtures = { workspace = true }

[lints]
workspace = true

[[example]]
name = "viewer"
path = "examples/viewer.rs"

# The web viewer example is built as a `cdylib` so wasm-bindgen can pick up
# the `#[wasm_bindgen(start)]` entry point. On native targets the example
# still compiles (as a no-op binary stub) so `cargo build --examples` keeps
# working across the workspace.
[[example]]
name = "web_viewer"
path = "examples/web_viewer.rs"
crate-type = ["cdylib", "rlib"]
