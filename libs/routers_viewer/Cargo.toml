[package]
name = "routers_viewer"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
name = "routers_viewer"
path = "src/lib.rs"
bench = false

[dependencies]
routers = { workspace = true }
routers_network = { workspace = true }
routers_codec = { workspace = true }

geo = { workspace = true }
wkt = { workspace = true }
dotenv = { workspace = true }
env_logger = "0.11"

# UI Dependencies — `wgpu` backend instead of the default `glow` so the
# same code path runs natively (Metal/Vulkan/DX12) and, later, in the
# browser (WebGPU). `default_fonts` is preserved so we keep the egui font
# atlas without having to ship one ourselves.
eframe = { version = "0.33.0", default-features = false, features = [
    "wgpu",
    "default_fonts",
] }
egui = "0.33.0"
walkers = "0.47" # Version compatible with egui 0.33

# Async runtime for any background tile fetching
tokio = { workspace = true }

# Mock Network Dependencies
petgraph = { workspace = true }
rstar = { workspace = true }
rustc-hash = { workspace = true }
pathfinding = "4.14.0"

[dev-dependencies]
routers_fixtures = { workspace = true }

[lints]
workspace = true

[[example]]
name = "viewer"
path = "examples/viewer.rs"
