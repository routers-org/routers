<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>routers viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f1115;
        color: #e7e7ea;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      #viewer-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
        z-index: 10;
        transition: opacity 0.2s ease-out;
      }
      #loading.gone {
        opacity: 0;
      }
    </style>

    <!-- Trunk: build the `web_viewer` bin as the page's Rust artefact.
         Sources live at `src/bin/web_viewer.rs`; cargo auto-discovers
         them. We use `data-bin` rather than `data-example` because
         trunk-ng 0.17 doesn't pick up cdylib example artefacts under
         `target/.../examples/`.
         `routers_shard`'s `osm` feature is on by default through the
         viewer's dependency declaration — no `data-cargo-features` needed. -->
    <link
      data-trunk
      rel="rust"
      data-bin="web_viewer"
      data-wasm-opt="z"
    />

    <!--
      Trunk: copy the per-shard `.shard.rt` blobs produced by
      `cargo run -p routers_shard --example build_shards --release`
      into `dist/shards/` so the browser fetcher can find them.
    -->
    <link
      data-trunk
      rel="copy-dir"
      href="../../target/shard_cache"
      data-target-path="shards"
    />
  </head>
  <body>
    <canvas id="viewer-canvas"></canvas>
    <div id="loading">loading shard…</div>
    <script>
      // The wasm bundle's `start` function flips this off once the
      // network is in hand. Pure cosmetic.
      window.addEventListener("viewer-ready", () => {
        const el = document.getElementById("loading");
        if (el) {
          el.classList.add("gone");
          setTimeout(() => el.remove(), 400);
        }
      });
    </script>
  </body>
</html>
