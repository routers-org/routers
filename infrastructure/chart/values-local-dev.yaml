# Local Development Chart Configuration.
# Debug logging + local-hostPath shard cache + in-cluster infra addresses
# assumed to live in the `routers-dev` devstack namespace of the same cluster
# (see `infrastructure/devstack/`). The routers release itself lives in
# `routers` by default.

infra:
  nats:
    url: nats://nats.routers-dev.svc.cluster.local:4222
  valkey:
    url: redis://valkey-primary.routers-dev.svc.cluster.local:6379
  otlp:
    url: http://otel-collector-opentelemetry-collector.routers-dev.svc.cluster.local:4318

shardCache:
  mode: hostPath
  # Overridden per-invocation by the Justfile so relative paths become absolute
  # against the developer's checkout. If invoking helm directly, pass an
  # absolute path via `--set shardCache.hostPath=<abs-dir>`.
  hostPath: ./target/shard_cache

matcher:
  rustLog: debug

orchestrator:
  rustLog: debug
