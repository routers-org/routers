{{- include "routers.requireInfra" . -}}
{{- if .Values.historian.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: historian
  labels:
    {{- include "routers.labels" . | nindent 4 }}
    app: historian
spec:
  replicas: {{ .Values.historian.replicas }}
  selector:
    matchLabels:
      app: historian
  template:
    metadata:
      labels:
        {{- include "routers.labels" . | nindent 8 }}
        app: historian
    spec:
      containers:
        - name: historian
          image: "{{ .Values.historian.image.repository }}:{{ .Values.historian.image.tag }}"
          imagePullPolicy: {{ .Values.historian.image.pullPolicy }}
          env:
            - name: NATS
              value: {{ .Values.infra.nats.url | quote }}
            - name: REDIS
              value: {{ .Values.infra.valkey.url | quote }}
            - name: SUBJECT
              value: "events.raw.>"
            - name: RUST_LOG
              value: {{ .Values.historian.rustLog | quote }}
            {{- range $name, $value := .Values.historian.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if .Values.infra.otlp.url }}
            # Spans exported here become Prometheus series via the
            # collector's spanmetrics pipeline; unset, telemetry degrades
            # to plain structured logs.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.infra.otlp.url | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.historian.resources | nindent 12 }}
{{- end }}
