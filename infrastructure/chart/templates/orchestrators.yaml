{{- range $shard := .Values.shards }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-{{ $shard }}
  labels:
    {{- include "routers.labels" $ | nindent 4 }}
    app: orchestrator-shard
    shard: "{{ $shard }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator-shard
      shard: "{{ $shard }}"
  template:
    metadata:
      labels:
        {{- include "routers.labels" $ | nindent 8 }}
        app: orchestrator-shard
        shard: "{{ $shard }}"
    spec:
      containers:
        - name: orchestrator
          image: "{{ $.Values.orchestrator.image.repository }}:{{ $.Values.orchestrator.image.tag }}"
          imagePullPolicy: {{ $.Values.orchestrator.image.pullPolicy }}
          env:
            - name: NATS
              value: {{ $.Values.infra.nats.url | quote }}
            - name: REDIS
              value: {{ $.Values.infra.valkey.url | quote }}
            - name: INBOUND_SUBJECT
              value: "events.raw.{{ $shard }}"
            - name: OUTBOUND_SUBJECT
              value: "events.match.{{ $shard }}"
            - name: RESULTS_SUBJECT
              value: "events.matched.{{ $shard }}"
            - name: RUST_LOG
              value: {{ $.Values.orchestrator.rustLog | quote }}
            {{- if $.Values.infra.otlp.url }}
            # Spans exported here become Prometheus series via the
            # collector's spanmetrics pipeline; unset, telemetry degrades
            # to plain structured logs.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.infra.otlp.url | quote }}
            {{- end }}
          resources:
            {{- toYaml $.Values.orchestrator.resources | nindent 12 }}
{{- end }}
