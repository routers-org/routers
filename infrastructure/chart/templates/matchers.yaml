{{- range $shard := .Values.shards }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matcher-{{ $shard }}
  labels:
    {{- include "routers.labels" $ | nindent 4 }}
    app: matcher
    shard: "{{ $shard }}"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: matcher
      shard: "{{ $shard }}"
  template:
    metadata:
      labels:
        {{- include "routers.labels" $ | nindent 8 }}
        app: matcher
        shard: "{{ $shard }}"
    spec:
      containers:
        - name: matcher
          image: "{{ $.Values.matcher.image.repository }}:{{ $.Values.matcher.image.tag }}"
          imagePullPolicy: {{ $.Values.matcher.image.pullPolicy }}
          env:
            - name: NATS
              value: {{ $.Values.infra.nats.url | quote }}
            - name: DIRECTORY
              value: "/shards"
            - name: PRECISION
              value: {{ $.Values.shardPrecision | quote }}
            - name: SHARD
              value: {{ $shard | quote }}
            - name: INBOUND_SUBJECT
              value: "events.match.{{ $shard }}"
            - name: OUTBOUND_SUBJECT
              value: "events.matched.{{ $shard }}"
            - name: RUST_LOG
              value: {{ $.Values.matcher.rustLog | quote }}
            {{- range $name, $value := $.Values.matcher.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if $.Values.infra.otlp.url }}
            # Spans exported here become Prometheus series via the
            # collector's spanmetrics pipeline; unset, telemetry degrades
            # to plain structured logs.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.infra.otlp.url | quote }}
            {{- end }}
          volumeMounts:
            - name: shards
              mountPath: /shards
              readOnly: true
          resources:
            {{- toYaml $.Values.matcher.resources | nindent 12 }}
      volumes:
        - name: shards
          {{- if eq $.Values.shardCache.mode "hostPath" }}
          hostPath:
            path: {{ $.Values.shardCache.hostPath | quote }}
            type: Directory
          {{- else if eq $.Values.shardCache.mode "pvc" }}
          persistentVolumeClaim:
            claimName: {{ $.Values.shardCache.pvc.claimName }}
          {{- else }}
          {{- fail (printf "shardCache.mode must be 'hostPath' or 'pvc', got %q" $.Values.shardCache.mode) }}
          {{- end }}
{{- end }}
