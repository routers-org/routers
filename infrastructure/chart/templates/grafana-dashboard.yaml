{{- if .Values.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: routers-realtime-dashboard
  labels:
    {{- include "routers.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  routers-realtime.json: |
{{ .Files.Get "files/grafana-dashboard.json" | indent 4 }}
{{- end }}
