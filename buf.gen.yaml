version: v2
plugins:
  - remote: buf.build/anthropics/buffa:v0.6.0
    out: schema/src/proto
    include_imports: true
    opt:
      - json=true
      - views=true
      - register_types=false

  - local: protoc-gen-buffa-packaging
    out: schema/src/proto
    strategy: all
    include_imports: true

  - remote: buf.build/anthropics/connect-rust:v0.6.0
    out: schema/src/rpc
    opt: [buffa_module=crate::proto]

  - local: protoc-gen-buffa-packaging
    out: schema/src/rpc
    strategy: all
    opt: [filter=services]
    include_imports: true
