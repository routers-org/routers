# Conformance: routers vs Valhalla
# Start Valhalla first: just start-valhalla

[run]
iterations = 50
warmup = 5
output = "table"

[matchers.routers]
enabled = true
network = "los-angeles-minified.osm.pbf"
search_distance = 50.0

[matchers.valhalla]
enabled = true
url = "http://localhost:8002"
costing = "auto"
shape_match = "map_snap"
gps_accuracy = 5

[matchers.graphhopper]
enabled = false

[matchers.fmm]
enabled = false

[[traces]]
id = "ventura"
file = "data/traces/ventura.geojson"

[[traces]]
id = "lax_lynwood"
file = "data/traces/lax_lynwood.geojson"
