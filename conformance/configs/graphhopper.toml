# Conformance: routers vs GraphHopper
# `just conform::graphhopper` starts/stops GraphHopper automatically via nix.

[run]
iterations = 50
warmup = 5
output = "table"

[matchers.routers]
enabled = true
network = "los-angeles-minified.osm.pbf"
search_distance = 50.0

[matchers.valhalla]
enabled = false

[matchers.graphhopper]
enabled = true
url = "http://localhost:8989"
profile = "car"
gps_accuracy = 5

[matchers.fmm]
enabled = false

[[traces]]
id = "ventura"
file = "data/traces/ventura.geojson"

[[traces]]
id = "lax_lynwood"
file = "data/traces/lax_lynwood.geojson"
