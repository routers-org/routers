# Conformance: routers vs FMM
# Start FMM first: just start-fmm

[run]
iterations = 50
warmup = 5
output = "table"

[matchers.routers]
enabled = true
network = "los-angeles-minified.osm.pbf"
search_distance = 50.0

[matchers.valhalla]
enabled = false

[matchers.graphhopper]
enabled = false

[matchers.fmm]
enabled = true
url = "http://localhost:9090"
k = 8
radius = 0.003
error = 0.0005

[[traces]]
id = "ventura"
file = "data/traces/ventura.geojson"

# lax_lynwood excluded: the minified PBF has disconnected road segments along
# the LAX→Lynwood corridor, causing STMATCH to fail on that trace.  Use a
# more complete OSM extract (e.g. full LA county PBF) to enable this trace.
